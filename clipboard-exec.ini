[index-paths]
path1=C:\_

[indexing]
enabled = true
interval_ms = 15000         ; Time between batch sweeps in milliseconds (e.g. 15 secs)
batch_size = 10             ; Number of folders to scan per batch slice to maintain zero-lag
ignore_dirs = node_modules;.git;.svn;dist;.next;build
ignore_guids = true         ; Ignore hex-isolated GUID/partial GUID named folders or files
ignore_files = true         ; Index both folders and files (set to false to index folders only)

[excluded-windows]
Title: Command Palette=1
Class: WinUIDesktopWin32WindowClass=1
Process: Microsoft.CmdPal.UI.exe=1

[Cursor]
sendkeys = {HOME}+{END}^c